# -- general -------------------------------------------------------------------

set -ga terminal-overrides ",xterm-256color:RGB"
set -g default-terminal "xterm-256color"

%if #{||:#{m/ri:mintty|iTerm,#{TERM_PROGRAM}},#{!=:#{XTERM_VERSION},}}
set -g extended-keys on
set -g extended-keys-format csi-u
%endif
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on

set -g prefix2 C-a
bind C-a send-prefix -2

set -q -g status-utf8 on
setw -q -g utf8 on

set -g history-limit 5000

%if #{>=:#{version},3.0}
bind e new-window -n "#{TMUX_CONF_LOCAL}" -e EDITOR="$EDITOR" sh -c 'case "${EDITOR:-vim}" in *vim*) ${EDITOR:-vim} -c ":set syntax=tmux" "$TMUX_CONF_LOCAL";; *) $EDITOR "$TMUX_CONF_LOCAL";; esac && "$TMUX_PROGRAM" ${TMUX_SOCKET:+-S "$TMUX_SOCKET"} source "$TMUX_CONF" \; display "$TMUX_CONF_LOCAL sourced"'
%else
set-environment -g EDITOR "$EDITOR"
bind e new-window -n "#{TMUX_CONF_LOCAL}" sh -c 'case "${EDITOR:-vim}" in *vim*) ${EDITOR:-vim} -c ":set syntax=tmux" "$TMUX_CONF_LOCAL";; *) $EDITOR "$TMUX_CONF_LOCAL";; esac && "$TMUX_PROGRAM" ${TMUX_SOCKET:+-S "$TMUX_SOCKET"} source "$TMUX_CONF" \; display "$TMUX_CONF_LOCAL sourced"'
%endif

bind r run "sh -c '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} source \"\$TMUX_CONF\"'" \; display "#{TMUX_CONF} sourced"

# -- display -------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1

setw -g automatic-rename on
set -g renumber-windows on

set -g set-titles on
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10

bind -n C-l send-keys C-l \; run "sleep 0.2" \; clear-history

set -g monitor-activity on
set -g visual-activity off

# -- navigation ----------------------------------------------------------------

bind C-c new-session
bind C-f command-prompt -p find-session "switch-client -t %%"
bind BTab switch-client -l

bind - split-window -v
bind _ split-window -h

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind ">" swap-pane -D
bind "<" swap-pane -U

bind + run "cut -c3- '#{TMUX_CONF}' | sh -s _maximize_pane '#{session_name}' '#D'"

bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind -r C-S-H swap-window -t -1 \; select-window -t -1
bind -r C-S-L swap-window -t +1 \; select-window -t +1
bind Tab last-window

bind m if -F "#{mouse}" "set -g mouse off; display 'mouse: off'" "set -g mouse on; display 'mouse: on'"
set -g mouse on

# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

if -b "command -v xsel > /dev/null 2>&1" "bind y run -b '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | xsel -i -b'"
if -b "! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1" "bind y run -b '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1'"
if -b "[ \"$XDG_SESSION_TYPE\" = \"wayland\" ] && command -v wl-copy > /dev/null 2>&1" "bind y run -b '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | wl-copy'"
if -b "command -v pbcopy > /dev/null 2>&1" "bind y run -b '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | pbcopy'"
if -b "command -v clip.exe > /dev/null 2>&1" "bind y run -b '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | clip.exe'"
if -b "[ -c /dev/clipboard ]" "bind y run -b '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - > /dev/clipboard'"

# -- buffers -------------------------------------------------------------------

bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# -- theme ---------------------------------------------------------------------

set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

if-shell "[ -f $HOME/.local/share/tmux/plugins/catppuccin/tmux/catppuccin.tmux ]" "run-shell '$HOME/.local/share/tmux/plugins/catppuccin/tmux/catppuccin.tmux'"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#[bg=#{@thm_flamingo},fg=#{@thm_crust}]#[reverse]#[noreverse]󱀙  "
set -ag status-right "#[fg=#{@thm_fg},bg=#{@thm_mantle}] #(memory_pressure | awk '/percentage/{print $5}') "
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right "#{E:@catppuccin_status_session}"

if-shell "[ -f $HOME/.local/share/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux ]" "run-shell '$HOME/.local/share/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux'"
if-shell "[ -f $HOME/.local/share/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux ]" "run-shell '$HOME/.local/share/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux'"
if-shell "[ -f $HOME/.local/share/tmux/plugins/tmux-plugins/tmux-resurrect/resurrect.tmux ]" "run-shell '$HOME/.local/share/tmux/plugins/tmux-plugins/tmux-resurrect/resurrect.tmux'"

# -- top status bar ------------------------------------------------------------

set -g pane-border-status top
set -g pane-border-format "#P: #(echo '#{pane_current_path}' | sed 's#$HOME#~#; s#\\([^/]*/[^/]*/\\).*\\(/[^/]*/.*\\)$#\\1 ... \\2#; s#/# > #g')"

# -- popups --------------------------------------------------------------------

bind C-t display-popup -w 60% -h 60% -y C -x C -d "#{pane_current_path}" -E "zsh"
bind C-p display-popup -w 60% -h 60% -y C -x C -d "#{pane_current_path}" -E "ipython"

# -- bell ----------------------------------------------------------------------

set -g bell-action none
set -g visual-bell off
set -g visual-activity off

# -- sesh ----------------------------------------------------------------------

bind-key T run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
